apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb
data:
  database-name: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb
data:
  mongo-host-port: mongodb.default

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb
data:
  tomcat-customer-port: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb
type: Opaque
data:
  database-password: UGlvdF8xMjM=
  database-user: cGlvdHI=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer
  labels:
    app: customer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer
  template:
    metadata:
      labels:
        app: customer
    spec:
      containers:
      - name: customer
        image: customer:1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mongodb
              key: database-name
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb
              key: database-user
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb
              key: database-password
        - name: MONGO_HOST_PORT
          valueFrom:
            configMapKeyRef:
              name: mongodb
              key: mongo-host-port

        - name: TOMCAT_CUSTOMER_PORT
          valueFrom:
            configMapKeyRef:
              name: mongodb
              key: tomcat-customer-port
---
apiVersion: v1
kind: Service
metadata:
  name: customer
  labels:
    app: customer
    spring-boot: "true"
spec:
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30055
    protocol: TCP
  selector:
    app: customer
  type: NodePort
