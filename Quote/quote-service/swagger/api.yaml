paths:
  /rest/quote/auth/v5:
    post:
      basePath: '/'
      summary: Add to Quote.
      consumes:
        - application/json
      parameters:
        - in: header
          name: Token
          type: string
          required: true
        - in: body
          name: user
          description: The Quote is added here.
          schema:
            # $ref: "swagger/schemas/Quote.yaml"
            type: object
            required:
              - storeId
            properties:
              storeId:
                type: number
              source:
                type: number
              customerId:
                type: string
              addToQuoteProductsRequests:
                type: array
                items:
                  type: object
                  properties:
                    sku:
                      type: string
                    parentSku: 
                      type: string
                    quantity: 
                      type: number
                    caSource: 
                      type: string
                    caSourceType: 
                      type: string
                    caSourceValue: 
                      type: string
                    overrideQuantity: 
                      type: boolean
      responses:
        200:
          description: created
          schema:
                type: object
                properties:
                  customerId :
                    type: number
                  error : 
                    type: boolean
                  quoteId :
                    type : string
                  status :
                    type : boolean
                  statusCode :
                    type : string
                  statusMsg :
                    type : string        
        400:
          description : failure
          schema:
                type: object
                properties:
                      status: 
                        type: boolean
                        default: false
                      statusCode :
                        type: string
                      statusMsg :
                        type: string
    delete:
      summary: Remove Item
      consumes:
        - application/json
      parameters:
        - in: header
          name: Token
          type: string
          required: true
        - in: body
          name: Remove Item
          description: Remove Item.
          schema:
            type: object
            properties:
              customerId:
                type : number
              quoteId:
                type : string
              skus:
                type: array
                items:
                  oneOf:
                    - type: string  
      responses:
          200:
            description: success
            schema:
                  type: object
                  properties:
                    status: 
                      type: boolean
                    statusCode :
                      type: string
                    statusMsg :
                      type: string 
          400:
            description : failure
            schema:
                  type: object
                  properties:
                        status: 
                          type: boolean
                          default: false
                        statusCode :
                          type: string
                        statusMsg :
                          type: string                         
  /rest/quote/auth/v5/view/metadata:
    get:
      summary: Get a Quote Details
      parameters:
        - in: query
          name: quoteId
          example: "164248805632946"
      responses:
        200:
          description: A single Quote details.
          schema:
                type: object
                properties:
                  status:
