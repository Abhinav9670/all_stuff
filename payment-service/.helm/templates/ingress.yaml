apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-ingress-nginx
  annotations:
    kubernetes.io/ingress.class: "nginx-new"
    nginx.ingress.kubernetes.io/ssl-redirect: 'false'
spec:
  tls:
    - hosts:
        - '{{ .Values.payment.domain }}'
      secretName: sslcert
  rules:
    - host: '{{ .Values.payment.domain }}'
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: payment
                port:
                  number: 5001

